services:
  postgres:
    image: postgres:16-alpine
    container_name: notice-tgbot-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notice}
      POSTGRES_DB: ${POSTGRES_DB:-notice}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-notice} -d ${POSTGRES_DB:-notice}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notice-tgbot-app-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-notice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notice}
      POSTGRES_DB: ${POSTGRES_DB:-notice}

volumes:
  postgres_dev_data:
